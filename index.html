  <body>
    <div id="root"></div>
    <script>
      // Auto-hide the "Next" button ("পরবর্তী ▶") and show a 5-second countdown instead.
      // The server will automatically advance the turn after 5 seconds.
      (function () {
        var COUNTDOWN_SECONDS = 5;
        var active = { button: null, el: null, t: null, remaining: 0 };

        function isOnlineMode() {
          try {
            // Online mode sets these when creating/joining a room.
            return !!sessionStorage.getItem("jd_online_room");
          } catch {
            return false;
          }
        }

        function normalizeText(s) {
          return String(s || "")
            .replace(/\s+/g, " ")
            .trim();
        }

        function isNextButton(btn) {
          if (!btn || btn.tagName !== "BUTTON") return false;
          var txt = normalizeText(btn.textContent);
          return txt === "পরবর্তী ▶";
        }

        function cleanup() {
          if (active.t) clearInterval(active.t);
          active.t = null;
          if (active.el && active.el.parentNode) active.el.parentNode.removeChild(active.el);
          active.el = null;
          if (active.button) active.button.style.removeProperty("display");
          active.button = null;
          active.remaining = 0;
        }

        function mount(btn) {
          cleanup();
          active.button = btn;
          btn.style.display = "none";

          var el = document.createElement("div");
          el.id = "__auto_next_timer";
          el.className = btn.className || "px-8 py-3 rounded-xl bg-primary text-primary-foreground font-bold";
          el.style.userSelect = "none";
          btn.parentNode.insertBefore(el, btn.nextSibling);
          active.el = el;

          active.remaining = COUNTDOWN_SECONDS;
          el.textContent = "পরবর্তী চাল " + active.remaining + " সেকেন্ডে…";
          active.t = setInterval(function () {
            // If React re-rendered and removed the original button, stop.
            if (!active.button || !document.contains(active.button)) {
              cleanup();
              return;
            }
            active.remaining -= 1;
            if (active.remaining <= 0) {
              // Server-side timer advances automatically; this is just UI.
              cleanup();
              return;
            }
            el.textContent = "পরবর্তী চাল " + active.remaining + " সেকেন্ডে…";
          }, 1000);
        }

        function tick() {
          try {
            // Offline mode: keep the original flow (no timer, user presses Next).
            if (!isOnlineMode()) {
              if (active.button) cleanup();
              return;
            }
            var buttons = document.querySelectorAll("button");
            var found = null;
            for (var i = 0; i < buttons.length; i++) {
              if (isNextButton(buttons[i])) {
                found = buttons[i];
                break;
              }
            }
            if (!found) {
              if (active.button) cleanup();
              return;
            }
            if (active.button !== found) mount(found);
          } catch {
            // ignore
          }
        }

        setInterval(tick, 250);
      })();
    </script>
    <script>
      // Offline mode fix: "তলোয়ারবাজ" (Swordsman) ফলাফলে কার্ডের নাম সবাইকে দেখানো বন্ধ।
      // এটি DOM-এ দেখানো টেক্সট থেকে "(কার্ডের নাম)" অংশ মুছে দেয়।
      (function () {
        var re = /^(.*)\\s\\([^)]*\\)\\sবনাম\\s(.*)\\s\\([^)]*\\)\\s—\\s(.*)$/;
        function normalizeText(s) {
          return String(s || "").replace(/\\s+/g, " ").trim();
        }
        function sanitizeNode(el) {
          if (!el || el.nodeType !== 1) return;
          if (el.children && el.children.length) return; // only leaf text nodes
          var txt = normalizeText(el.textContent);
          if (!txt) return;
          // Only sanitize lines that look like "A (Card) বনাম B (Card) — ..."
          if (txt.indexOf("বনাম") === -1 || txt.indexOf("(") === -1 || txt.indexOf(")") === -1 || txt.indexOf("—") === -1) return;
          var m = txt.match(re);
          if (!m) return;
          var clean = m[1] + " বনাম " + m[2] + " — " + m[3];
          if (clean !== txt) el.textContent = clean;
        }
        function tick() {
          try {
            var root = document.getElementById("root");
            if (!root) return;
            // scan common text nodes (p/div/span/button etc.)
            var nodes = root.querySelectorAll("p,div,span,button");
            for (var i = 0; i < nodes.length; i++) sanitizeNode(nodes[i]);
          } catch {
            // ignore
          }
        }
        setInterval(tick, 250);
      })();
    </script>
