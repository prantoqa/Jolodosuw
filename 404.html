<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting…</title>
    <!--
      GitHub Pages does not serve index.html for deep links (e.g. /Game1/room/123),
      so refresh shows a 404. This file redirects those URLs back to index.html.

      If your repo name is NOT "Game1", change `segmentCount` below:
        - User/Org GitHub Pages repo: segmentCount = 1
        - Custom domain at root: segmentCount = 0
    -->
    <script>
      (function () {
        var segmentCount = 1;
        var l = window.location;
        var repoRoot = l.pathname.split("/").slice(0, 1 + segmentCount).join("/");
        var deepPath = l.pathname.split("/").slice(1 + segmentCount).join("/");

        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            repoRoot +
            "/?/" +
            deepPath.replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
